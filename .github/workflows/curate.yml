name: Curate Work Focus Playlist

on:
  schedule:
    # 매일 UTC 20:07 = KST 05:07 에 실행
    # (정각 :00 은 GitHub 스케줄러 부하로 지연/드롭이 잦아 분을 7로 어긋나게 둠)
    - cron: "7 20 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "추가하지 않고 선정 결과만 출력"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: curate-work-focus
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run curator
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # 추가된 영상 요약 메일(AWS SES). 비밀 아닌 값은 Actions Variables 로 관리.
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          SES_TO_EMAIL: ${{ vars.SES_TO_EMAIL }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          # AWS 자격증명만 secret. (미설정 시 메일 발송은 자동으로 건너뜀)
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # 추가된 영상 요약 Slack 알림. Webhook URL 은 secret. (미설정 시 자동으로 건너뜀)
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python -m curator.main --config config.yaml \
            ${{ inputs.dry_run && '--dry-run' || '' }}
